<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="shortcut icon" type="image/svg" href="favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300..600&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="main.css" />
		<title>Shelf</title>
	</head>
	<body>
		<main class="shell">
			<section class="clock-panel" aria-label="Current time">
				<div class="time-row">
					<div id="time">00:00</div>
					<span class="cursor-block" aria-hidden="true"></span>
				</div>
				<div id="date">JAN.01.2026</div>
			</section>

			<section class="bookmark-grid" aria-label="Bookmarks">
				<div class="bookmark-group bookmark-group--cyan">
					<div class="group-heading">
						<span class="material-symbols-outlined" aria-hidden="true">push_pin</span>
						<h2>Pinned</h2>
					</div>
					<ul>
						<li>
							<a href="https://www.youtube.com/feed/subscriptions" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=48" alt="" />
								<span>YouTube</span>
							</a>
						</li>
						<li>
							<a href="https://www.familywall.com/events.php" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=familywall.com&sz=48" alt="" />
								<span>Family Wall</span>
							</a>
						</li>
						<li>
							<a href="https://app.clockify.me/tracker" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=clockify.me&sz=48" alt="" />
								<span>Clockify</span>
							</a>
						</li>
						<li>
							<a id="hacker-news-link" href="https://news.ycombinator.com/show" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=ycombinator.com&sz=48" alt="" />
								<span>Hacker News</span>
							</a>
						</li>
						<li>
							<a href="https://habitica.com/" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=habitica.com&sz=48" alt="" />
								<span>Habitica</span>
							</a>
						</li>
					</ul>
				</div>

				<div class="bookmark-group">
					<div class="group-heading">
						<span class="material-symbols-outlined" aria-hidden="true">category</span>
						<h2>Misc</h2>
					</div>
					<ul>
						<li>
							<a href="https://bookmarkjar.com/dashboard/bookmarks" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=bookmarkjar.com&sz=48" alt="" />
								<span>Bookmark Jar</span>
							</a>
						</li>
						<li>
							<a href="https://www.namecheap.com/market/auctions/" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=namecheap.com&sz=48" alt="" />
								<span>NC Auctions</span>
							</a>
						</li>
						<li>
							<a href="https://www.producthunt.com/" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=producthunt.com&sz=48" alt="" />
								<span>Product Hunt</span>
							</a>
						</li>
					</ul>
				</div>

				<div class="bookmark-group bookmark-group--purple">
					<div class="group-heading">
						<span class="material-symbols-outlined" aria-hidden="true">psychology</span>
						<h2>AI</h2>
					</div>
					<ul>
						<li>
							<a href="https://claude.ai/new" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=claude.ai&sz=48" alt="" />
								<span>Claude</span>
							</a>
						</li>
						<li>
							<a href="https://v0.dev" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=v0.dev&sz=48" alt="" />
								<span>V0</span>
							</a>
						</li>
						<li>
							<a href="https://t3.chat" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=t3.chat&sz=48" alt="" />
								<span>T3 Chat</span>
							</a>
						</li>
						<li>
							<a href="https://chat.openai.com" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=openai.com&sz=48" alt="" />
								<span>ChatGPT</span>
							</a>
						</li>
					</ul>
				</div>

				<div class="bookmark-group">
					<div class="group-heading">
						<span class="material-symbols-outlined" aria-hidden="true">terminal</span>
						<h2>Dev</h2>
					</div>
					<ul>
						<li>
							<a href="https://github.com/" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=github.com&sz=48" alt="" />
								<span>GitHub</span>
							</a>
						</li>
						<li>
							<a href="https://skool.com/" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=skool.com&sz=48" alt="" />
								<span>Skool</span>
							</a>
						</li>
						<li>
							<a href="https://app.daily.dev/" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=daily.dev&sz=48" alt="" />
								<span>Daily Dev</span>
							</a>
						</li>
						<li>
							<a href="https://ui.shadcn.com/docs" class="bookmark-link">
								<img src="https://www.google.com/s2/favicons?domain=shadcn.com&sz=48" alt="" />
								<span>Shadcn</span>
							</a>
						</li>
					</ul>
				</div>
			</section>
		</main>

		<script src="main.js"></script>
	</body>
</html>
